<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Chat Widget Embed Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #1f2937;
      }
      main {
        max-width: 900px;
        margin: 48px auto;
        padding: 24px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chat Widget Local Embed Test</h1>
      <p>
        This page loads <code>chat-widget.js</code> from Vite and injects the
        chat iframe.
      </p>
      <p>
        Try changing query params in the script URL:
        <code>pattern</code>, <code>x</code>, <code>y</code>,
        <code>radius</code>, <code>shadow</code>, <code>w</code>, <code>h</code>.
      </p>
    </main>

    <script
      src="https://chat-widget-xi-five.vercel.app/chat-widget.js"

      data-embed-path="/"
      data-width="100%"

      data-style="position:fixed;inset:0;border:0;background:transparent;z-index:2147483647;width:100vw;height:100vh;max-height:none"
      crossorigin="anonymous"
      async
    ></script>
  </body>
</html>
